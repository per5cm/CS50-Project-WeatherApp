<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" href="./Styles/styles.css" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+S" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Weather App</h1>

        <div class="card shadow">
            <div class="card-body">
                <!-- <p class="card-text">Enter a city to get its weather information.</p> -->
                
                <form action="/" method="post" class="mb-4">
                    <div class="mb-3">
                        <label for="cityName" class="form-label">City Name</label>
                        <input type="text" id="cityName" name="cityName" placeholder="City" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="stateName" class="form-label">Region (Optional)</label>
                        <input type="text" id="stateName" name="stateName" placeholder="Region (e.g., NRW for North Rhine-Westphalia)" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="countryName" class="form-label">Country</label>
                        <input type="text" id="countryName" name="countryName" placeholder="Default: Germany" value="Germany" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Get Weather Information</button>
                </form>
            </div>
        </div>

    {% if data %}
    <div class="text-center mt-4">
        <h2>{{ city }}, {{ country }}</h2>
        <p class="text-light">{{ data.main }}: {{ data.description }}</p>
        <img src="https://openweathermap.org/img/wn/{{data.icon}}@2x.png" alt="Icon">
        <h2 class="display-4 fw-light">{{data.temperature}} °C</h2>
    </div>
    {% endif %}

    {% if data.error %}
    <div class="alert alert-danger mt-4" role="alert">
        {{ data.error }}
    </div>
    {% endif %}

    </div>

    <p class="text-center mt-4 small text-secondary">CS50 Final Project + Flask + OpenWeatherMap API</p>
</body>
</html>
